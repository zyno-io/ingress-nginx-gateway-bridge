replicaCount: 2

image:
  repository: ghcr.io/zyno-io/ingress-nginx-gateway-bridge
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

controller:
  gateway:
    # Empty means the Helm release namespace.
    namespace: ""
    name: ingress-nginx
    className: nginx
    # Optional same-namespace NginxProxy parameters resource. Set this when
    # routes use ExternalName Services so NGF has a DNS resolver.
    nginxProxyName: ""
    manage: true
    # Permit platform-owned ListenerSets in the Gateway namespace to add
    # non-Ingress listeners such as SNI-based TLS passthrough.
    allowListenerSets: false
    httpSectionName: http
    # Shared HTTPS listener name.
    httpsSectionName: https

  # Hot-swap defaults: take classless Ingresses and those using the legacy nginx class.
  watchIngressWithoutClass: true
  ingressClasses:
    - nginx

  strict: true
  # Disable during side-by-side preflight to prevent external-dns from switching
  # records before the intended cutover.
  updateIngressStatus: true
  # This controls source-provided snippets. Generated compatibility snippets for
  # external auth and capture rewrites are not source snippets.
  allowSnippets: false
  leaderElect: true

ingressClass:
  # Optional isolation mechanism; not required for hot-swap operation.
  create: false
  name: ngf-compat
  isDefaultClass: false

metrics:
  enabled: true
  service:
    port: 8080

resources:
  requests:
    cpu: 20m
    memory: 64Mi
  limits:
    memory: 256Mi

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
