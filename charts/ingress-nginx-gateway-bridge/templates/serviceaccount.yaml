{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ingress-nginx-gateway-bridge.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ingress-nginx-gateway-bridge.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
