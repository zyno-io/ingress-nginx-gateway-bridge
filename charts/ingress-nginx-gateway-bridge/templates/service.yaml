{{- if .Values.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ingress-nginx-gateway-bridge.fullname" . }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ingress-nginx-gateway-bridge.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "ingress-nginx-gateway-bridge.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.metrics.service.port }}
      targetPort: metrics
      protocol: TCP
{{- end }}
